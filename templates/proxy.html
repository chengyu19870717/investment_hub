<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>代理网关 - 程钰的百宝箱</title>
    <link rel="stylesheet" href="/static/css/style.css?v=2">
</head>
<body>
<div class="page">
    <header class="header">
        <div class="header-inner">
            <div style="display:flex;align-items:center;gap:12px;">
                <a href="/" class="back-btn">←</a>
                <div class="logo">
                    <span class="logo-icon">🌐</span>
                    <span class="logo-text">代理网关</span>
                </div>
            </div>
        </div>
    </header>

    <main class="main">
        <div class="section-label">系统代理状态</div>
        <div class="card" style="display:block;">
            <div class="card-body" style="display:block;text-align:center;padding:32px 0 28px;">
                <!-- 状态指示灯 -->
                <div id="status-dot" class="proxy-dot"></div>
                <div id="status-text" class="proxy-status-text">检测中…</div>
                <div id="proxy-info" class="proxy-info-text" style="display:none;margin-bottom:24px;"></div>

                <!-- 开关按钮 -->
                <div style="display:flex;gap:12px;justify-content:center;margin-top:20px;">
                    <button id="btn-on"  class="proxy-btn proxy-btn--on"  onclick="setProxy(true)">开启代理</button>
                    <button id="btn-off" class="proxy-btn proxy-btn--off" onclick="setProxy(false)">关闭代理</button>
                </div>
            </div>
        </div>

        <!-- 错误提示 -->
        <div id="error-area" style="display:none;margin-top:12px;">
            <div class="card card--error" style="display:block;">
                <div class="card-body" style="display:block;">
                    <div id="error-msg" style="color:#ff3b30;font-size:14px;"></div>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer"><span>程钰的百宝箱 · 本地版</span></footer>
</div>

<script>
const dot       = document.getElementById('status-dot');
const statusTxt = document.getElementById('status-text');
const infoTxt   = document.getElementById('proxy-info');
const errorArea = document.getElementById('error-area');
const errorMsg  = document.getElementById('error-msg');
const btnOn     = document.getElementById('btn-on');
const btnOff    = document.getElementById('btn-off');

let busy = false;

function setUI(enabled) {
    dot.className = 'proxy-dot ' + (enabled ? 'proxy-dot--on' : 'proxy-dot--off');
    statusTxt.textContent = enabled ? '代理已开启' : '代理已关闭';
    statusTxt.style.color = enabled ? '#34c759'    : 'var(--text-muted)';
    btnOn.disabled  = enabled;
    btnOff.disabled = !enabled;
    btnOn.style.opacity  = enabled  ? '0.4' : '1';
    btnOff.style.opacity = !enabled ? '0.4' : '1';
    errorArea.style.display = 'none';
}

function showError(msg) {
    errorArea.style.display = 'block';
    errorMsg.textContent = msg;
}

async function loadStatus() {
    try {
        const res  = await fetch('/api/proxy/status');
        const data = await res.json();
        if (data.error) { showError(data.error); return; }
        setUI(data.enabled);
        infoTxt.textContent   = '代理地址：' + data.host + ':' + data.port + '  ·  ' + data.iface;
        infoTxt.style.display = 'block';
    } catch(e) {
        showError('无法获取代理状态：' + e.message);
    }
}

async function setProxy(enable) {
    if (busy) return;
    const current = btnOn.disabled; // btnOn.disabled=true 说明当前已开启
    if (enable === current) return;
    busy = true;
    btnOn.disabled = btnOff.disabled = true;
    statusTxt.textContent = '切换中…';
    statusTxt.style.color = 'var(--text-muted)';
    try {
        const res  = await fetch('/api/proxy/toggle', { method: 'POST' });
        const data = await res.json();
        if (data.error) { showError(data.error); await loadStatus(); }
        else             { setUI(data.enabled); }
    } catch(e) {
        showError('切换失败：' + e.message);
        await loadStatus();
    } finally {
        busy = false;
    }
}

loadStatus();
</script>
</body>
</html>
