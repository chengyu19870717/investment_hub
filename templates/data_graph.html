<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>关联图谱 - 数据标准</title>
    <link rel="stylesheet" href="/static/css/style.css?v=2">
    <style>
        body { background: var(--bg-page); }
        .graph-page { max-width: 1400px; margin: 0 auto; padding: 24px; }
        .graph-header { display: flex; align-items: center; gap: 16px; margin-bottom: 24px; }
        .graph-title { font-size: 18px; font-weight: 600; color: var(--text-primary); }
        .graph-subtitle { font-size: 13px; color: var(--text-muted); margin-top: 2px; }
        .graph-canvas-wrap {
            background: var(--bg-card);
            border-radius: 12px;
            border: 1px solid var(--border);
            overflow: auto;
            padding: 32px 24px;
        }
        svg#graph { display: block; }
        /* Node colors */
        .nd-root  { fill: #3a7bd5; }
        .nd-field { fill: #34c759; }
        .nd-iface { fill: #ff9500; }
        .nd-rule  { fill: #af52de; }
        .nd-label { fill: #fff; font-size: 12px; font-family: -apple-system,sans-serif; font-weight: 500; }
        .nd-sub   { fill: rgba(255,255,255,0.75); font-size: 10px; font-family: -apple-system,sans-serif; }
        /* Edges */
        .edge-field { fill:none; stroke:#34c759; stroke-width:1.5; marker-end:url(#arr-field); }
        .edge-iface { fill:none; stroke:#ff9500; stroke-width:1.5; marker-end:url(#arr-iface); }
        .edge-rule  { fill:none; stroke:#af52de; stroke-width:1.5; marker-end:url(#arr-rule);  }
        .edge-lbl   { font-size:10px; font-family:-apple-system,sans-serif; fill:var(--text-muted); }
        /* Column labels */
        .col-lbl { font-size:11px; font-family:-apple-system,sans-serif; fill:var(--text-muted); font-weight:600; letter-spacing:.5px; }
        /* Empty */
        .empty-hint { font-size:15px; font-family:-apple-system,sans-serif; fill:var(--text-muted); }
        /* Legend */
        .legend { display:flex; gap:24px; margin-top:20px; font-size:12px; color:var(--text-muted); flex-wrap:wrap; }
        .legend-item { display:flex; align-items:center; gap:6px; }
        .legend-dot { width:12px; height:12px; border-radius:3px; }
    </style>
</head>
<body>
<div class="graph-page">
    <div class="graph-header">
        <a href="/data-standard" class="back-btn" title="返回数据标准">←</a>
        <div>
            <div class="graph-title" id="pageTitle">关联图谱</div>
            <div class="graph-subtitle" id="pageSubtitle">加载中…</div>
        </div>
    </div>

    <div class="graph-canvas-wrap">
        <svg id="graph" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <marker id="arr-field" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
                    <polygon points="0 0,8 3,0 6" fill="#34c759"/>
                </marker>
                <marker id="arr-iface" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
                    <polygon points="0 0,8 3,0 6" fill="#ff9500"/>
                </marker>
                <marker id="arr-rule" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
                    <polygon points="0 0,8 3,0 6" fill="#af52de"/>
                </marker>
            </defs>
            <g id="graphContent">
                <text class="empty-hint" x="200" y="100">加载中…</text>
            </g>
        </svg>
    </div>

    <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:#3a7bd5"></div> 字根 / 字段（中心节点）</div>
        <div class="legend-item"><div class="legend-dot" style="background:#34c759"></div> 引用字段</div>
        <div class="legend-item"><div class="legend-dot" style="background:#ff9500"></div> 接口</div>
        <div class="legend-item"><div class="legend-dot" style="background:#af52de"></div> 规则</div>
    </div>
</div>

<script>
(function () {
    'use strict';

    const params = new URLSearchParams(location.search);
    const type   = params.get('type');   // 'root' | 'field'
    const id     = params.get('id');

    if (!type || !id) {
        document.getElementById('pageSubtitle').textContent = '参数缺失，请从数据标准页面进入';
        return;
    }

    // ── SVG helpers ─────────────────────────────────────────
    const NS  = 'http://www.w3.org/2000/svg';
    const NW  = 160;   // node width
    const NH  = 48;    // node height
    const PAD = 40;    // canvas padding
    const COL = 220;   // column gap

    function svgEl(tag, attrs) {
        const e = document.createElementNS(NS, tag);
        Object.entries(attrs || {}).forEach(([k, v]) => e.setAttribute(k, v));
        return e;
    }

    function makeNode(gc, x, y, label, sub, colorClass) {
        const colors = { root:'#3a7bd5', field:'#34c759', iface:'#ff9500', rule:'#af52de' };
        const fill = colors[colorClass] || '#888';
        const g = svgEl('g', { transform: 'translate(' + x + ',' + y + ')' });
        g.appendChild(svgEl('rect', { x:0, y:0, width:NW, height:NH, rx:8, fill:fill }));

        const t1 = svgEl('text', { x: NW/2, y: sub ? 19 : 28, 'text-anchor':'middle', class:'nd-label' });
        t1.textContent = trunc(label, 17);
        g.appendChild(t1);

        if (sub) {
            const t2 = svgEl('text', { x: NW/2, y: 35, 'text-anchor':'middle', class:'nd-sub' });
            t2.textContent = trunc(sub, 22);
            g.appendChild(t2);
        }
        gc.appendChild(g);
        return {
            rx: x + NW, ry: y + NH/2,
            lx: x,      ly: y + NH/2,
            cx: x + NW/2
        };
    }

    function makeCurve(gc, x1, y1, x2, y2, cls) {
        const mid = (x1 + x2) / 2;
        gc.insertBefore(
            svgEl('path', {
                d: 'M'+x1+','+y1+' C'+mid+','+y1+' '+mid+','+y2+' '+x2+','+y2,
                class: cls
            }),
            gc.firstChild
        );
    }

    function colLabel(gc, x, y, text) {
        const t = svgEl('text', { x: x + NW/2, y: y, 'text-anchor':'middle', class:'col-lbl' });
        t.textContent = text;
        gc.appendChild(t);
    }

    function trunc(s, n) {
        if (!s) return '';
        return s.length > n ? s.slice(0, n-1) + '…' : s;
    }

    function layoutY(total, svgH) {
        const blockH = total * NH + (total - 1) * 20;
        return Math.max(PAD + 40, (svgH - blockH) / 2);
    }

    // ── Render ───────────────────────────────────────────────
    // fieldNodes: [{id, name_en, name_cn}]
    // ifaceNodes / ruleNodes: [{id, name, via:[field_id]}]  — via = which fields link here
    function render(centerLabel, centerSub, fieldNodes, ifaceNodes, ruleNodes) {
        const gc  = document.getElementById('graphContent');
        const svg = document.getElementById('graph');
        gc.textContent = '';

        // Column count: 1 (center) + maybe fields + maybe ifaces/rules
        const hasFields = fieldNodes.length > 0;
        const hasRight  = ifaceNodes.length > 0 || ruleNodes.length > 0;
        const rightNodes = [...ifaceNodes, ...ruleNodes];

        // Determine col X positions
        const col0X = PAD;
        const col1X = hasFields ? col0X + NW + COL : col0X + NW + COL;
        const col2X = col1X + NW + COL;

        // SVG height: enough to fit the tallest column
        const col0Rows = 1;
        const col1Rows = hasFields ? fieldNodes.length : rightNodes.length;
        const col2Rows = hasFields ? rightNodes.length : 0;
        const maxRows  = Math.max(col0Rows, col1Rows, col2Rows, 1);
        const svgH     = Math.max(240, maxRows * (NH + 20) + PAD * 2 + 40);
        const svgW     = hasFields && hasRight ? col2X + NW + PAD
                        : hasFields            ? col1X + NW + PAD
                        : col1X + NW + PAD;

        svg.setAttribute('width',  svgW);
        svg.setAttribute('height', svgH);
        svg.setAttribute('viewBox', '0 0 ' + svgW + ' ' + svgH);

        // No data at all
        if (!hasFields && !hasRight) {
            colLabel(gc, col0X, 32, type === 'root' ? '字根' : '字段');
            makeNode(gc, col0X, (svgH - NH) / 2, centerLabel, centerSub, 'root');
            const hint = svgEl('text', { x: col1X + 60, y: svgH/2, 'text-anchor':'middle', class:'empty-hint' });
            hint.textContent = '暂无关联';
            gc.appendChild(hint);
            return;
        }

        // ── Column headers ──
        colLabel(gc, col0X, 24, type === 'root' ? '字根' : '字段');
        if (hasFields)       colLabel(gc, col1X, 24, '字段');
        if (hasFields && hasRight) colLabel(gc, col2X, 24, '接口 / 规则');
        else if (hasRight)   colLabel(gc, col1X, 24, '接口 / 规则');

        // ── Center node ──
        const srcPort = makeNode(gc, col0X, (svgH - NH) / 2, centerLabel, centerSub, 'root');

        // ── Field nodes (col1, only for root view) ──
        const fieldPortMap = {};   // field_id → port
        if (hasFields) {
            const startY = layoutY(fieldNodes.length, svgH);
            fieldNodes.forEach(function (f, i) {
                const fy = startY + i * (NH + 20);
                const p  = makeNode(gc, col1X, fy, f.name_cn || f.name_en, f.name_en, 'field');
                makeCurve(gc, srcPort.rx, srcPort.ry, p.lx, p.ly, 'edge-field');
                fieldPortMap[f.id] = p;
            });
        }

        // ── Right nodes: ifaces then rules ──
        const rightCol = hasFields ? col2X : col1X;
        const startY2  = layoutY(rightNodes.length, svgH);
        rightNodes.forEach(function (item, i) {
            const ry  = startY2 + i * (NH + 20);
            const cls = item._kind === 'rule' ? 'rule' : 'iface';
            const p   = makeNode(gc, rightCol, ry, item.name || item.id, item.id, cls);
            const edgeCls = item._kind === 'rule' ? 'edge-rule' : 'edge-iface';

            if (hasFields && item._via && item._via.length) {
                // connect from each field that references this iface/rule
                item._via.forEach(function (fid) {
                    const fp = fieldPortMap[fid];
                    if (fp) makeCurve(gc, fp.rx, fp.ry, p.lx, p.ly, edgeCls);
                });
            } else {
                // field view: connect directly from center node
                makeCurve(gc, srcPort.rx, srcPort.ry, p.lx, p.ly, edgeCls);
            }
        });
    }

    // ── Data fetch & wire ────────────────────────────────────
    async function loadAndRender() {
        try {
            const [allRoots, allFields, allIfaces, allRules] = await Promise.all([
                fetch('/api/data-roots').then(r => r.json()),
                fetch('/api/data-fields').then(r => r.json()),
                fetch('/api/interfaces').then(r => r.json()),
                fetch('/api/rules').then(r => r.json()),
            ]);

            function parseJ(s) { try { return JSON.parse(s); } catch { return []; } }
            function fieldIds(obj) {
                return [...parseJ(obj.input_json), ...parseJ(obj.output_json)].map(x => x.field_id);
            }

            if (type === 'root') {
                const root = allRoots.find(r => r.id === id);
                if (!root) { document.getElementById('pageSubtitle').textContent = '找不到字根：' + id; return; }
                document.getElementById('pageTitle').textContent = '字根「' + root.name + '」关联图谱';
                document.getElementById('pageSubtitle').textContent = (root.meaning || '') + (root.root_type ? '  ·  ' + root.root_type : '');

                const usedFields = allFields.filter(f => f.root_id === id);
                const usedFieldIds = new Set(usedFields.map(f => f.id));

                const usedIfaces = allIfaces
                    .map(function (ifc) {
                        const via = fieldIds(ifc).filter(fid => usedFieldIds.has(fid));
                        return via.length ? Object.assign({}, ifc, { _kind:'iface', _via: [...new Set(via)] }) : null;
                    }).filter(Boolean);

                const usedRules = allRules
                    .map(function (ru) {
                        const via = fieldIds(ru).filter(fid => usedFieldIds.has(fid));
                        return via.length ? Object.assign({}, ru, { _kind:'rule', _via: [...new Set(via)] }) : null;
                    }).filter(Boolean);

                render(root.name, root.id, usedFields, usedIfaces, usedRules);

            } else if (type === 'field') {
                const field = allFields.find(f => f.id === id);
                if (!field) { document.getElementById('pageSubtitle').textContent = '找不到字段：' + id; return; }
                document.getElementById('pageTitle').textContent = '字段「' + (field.name_cn || field.name_en) + '」关联图谱';
                document.getElementById('pageSubtitle').textContent = field.name_en + (field.field_type ? '  ·  ' + field.field_type : '');

                const usedIfaces = allIfaces
                    .filter(ifc => fieldIds(ifc).includes(id))
                    .map(ifc => Object.assign({}, ifc, { _kind:'iface' }));
                const usedRules = allRules
                    .filter(ru => fieldIds(ru).includes(id))
                    .map(ru => Object.assign({}, ru, { _kind:'rule' }));

                render(field.name_cn || field.name_en, field.name_en, [], usedIfaces, usedRules);
            }
        } catch (e) {
            document.getElementById('pageSubtitle').textContent = '加载失败：' + e.message;
            console.error(e);
        }
    }

    loadAndRender();
})();
</script>
</body>
</html>
