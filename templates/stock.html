<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>股票分析 - 程钰的百宝箱</title>
    <link rel="stylesheet" href="/static/css/style.css?v=2">
<style>
/* 后台刷新进度条 */
.refresh-progress-bar {
    position: relative;
    height: 3px;
    background: var(--bg-page);
    overflow: hidden;
}
.refresh-progress-fill {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 30%;
    background: var(--accent);
    animation: refresh-slide 1.2s ease-in-out infinite;
}
@keyframes refresh-slide {
    0%   { left: -30%; width: 30%; }
    50%  { width: 50%; }
    100% { left: 100%; width: 30%; }
}
.refresh-progress-text {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 11px;
    color: var(--text-muted);
    white-space: nowrap;
}

/* 刷新完成 Toast */
.refresh-toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 999;
    animation: toast-slide-up 0.3s ease;
}
@keyframes toast-slide-up {
    from { opacity: 0; transform: translateX(-50%) translateY(20px); }
    to   { opacity: 1; transform: translateX(-50%) translateY(0); }
}
.refresh-toast-content {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 18px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    font-size: 14px;
}
.refresh-toast-icon { font-size: 18px; }
.refresh-toast-text { color: var(--text-primary); font-weight: 500; }
.refresh-toast-btn {
    padding: 5px 14px;
    border: none;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    background: var(--accent);
    color: #fff;
    transition: opacity 0.15s;
}
.refresh-toast-btn:hover { opacity: 0.85; }
.refresh-toast-btn--dim {
    background: var(--badge-bg);
    color: var(--text-muted);
}
</style>
</head>
<body>
<div class="page page--wide">
    <header class="header">
        <div class="header-inner">
            <div style="display:flex;align-items:center;justify-content:space-between;">
                <div style="display:flex;align-items:center;gap:12px;">
                    <a href="/" class="back-btn">←</a>
                    <div class="logo">
                        <span class="logo-icon">📈</span>
                        <span class="logo-text">股票分析</span>
                    </div>
                </div>
                <div style="display:flex;align-items:center;gap:8px;">
                    <select id="date-select" class="date-select">
                        {% for d in dates %}
                        <option value="{{ d }}">{{ d }}</option>
                        {% endfor %}
                    </select>
                    <button id="refresh-btn" class="btn-secondary" title="后台刷新">↻</button>
                </div>
            </div>
        </div>
    </header>

    <!-- 后台刷新进度条 -->
    <div id="refresh-progress" style="display:none;">
        <div class="refresh-progress-bar">
            <div class="refresh-progress-fill" id="refresh-progress-fill"></div>
            <span class="refresh-progress-text" id="refresh-progress-text">正在分析…</span>
        </div>
    </div>

    <!-- 刷新完成提示 -->
    <div id="refresh-toast" class="refresh-toast" style="display:none;">
        <div class="refresh-toast-content">
            <span class="refresh-toast-icon">✅</span>
            <span class="refresh-toast-text">报告已生成，是否加载最新结果？</span>
            <button class="refresh-toast-btn" id="toast-reload-btn">立即加载</button>
            <button class="refresh-toast-btn refresh-toast-btn--dim" id="toast-dismiss-btn">稍后</button>
        </div>
    </div>

    <main class="main" id="stock-main">
        <div id="loading" style="text-align:center;padding:60px 0;color:var(--text-muted);">加载中…</div>
        <div id="stock-content" style="display:none;">
            <!-- 排行榜 -->
            <div class="section-label">明日上涨概率排行</div>
            <div id="rank-list"></div>

            <!-- 详细卡片 -->
            <div class="section-label" style="margin-top:24px;">个股详情</div>
            <div id="detail-list"></div>
        </div>
    </main>
    <footer class="footer"><span>程钰的百宝箱 · 本地版</span></footer>
</div>

<script>
const dateSelect = document.getElementById('date-select');

function probColor(p) {
    if (p >= 60) return '#34c759';
    if (p >= 45) return '#ff9500';
    return '#ff3b30';
}

function scoreBar(score) {
    const filled = Math.round(score / 20);
    return '★'.repeat(filled) + '☆'.repeat(5 - filled);
}

function renderRank(stocks) {
    const el = document.getElementById('rank-list');
    el.replaceChildren();
    stocks.forEach((s, i) => {
        const card = document.createElement('div');
        card.className = 'rank-card';
        card.style.setProperty('--prob-color', probColor(s.probability));

        const pct = s.probability;
        const changeSign = s.change_pct >= 0 ? '+' : '';
        const chipSigs = s.chip['筹码信号'] || '—';

        const num    = document.createElement('div'); num.className = 'rank-num'; num.textContent = i + 1;
        const info   = document.createElement('div'); info.className = 'rank-info';
        const row1   = document.createElement('div'); row1.className = 'rank-row1';

        const nameEl = document.createElement('span'); nameEl.className = 'rank-name'; nameEl.textContent = s.name;
        const codeEl = document.createElement('span'); codeEl.className = 'rank-code'; codeEl.textContent = s.code;
        const chgEl  = document.createElement('span');
        chgEl.className = 'rank-change ' + (s.change_pct >= 0 ? 'up' : 'down');
        chgEl.textContent = changeSign + s.change_pct.toFixed(2) + '%';

        row1.appendChild(nameEl); row1.appendChild(codeEl); row1.appendChild(chgEl);

        const barWrap = document.createElement('div'); barWrap.className = 'prob-bar-wrap';
        const bar = document.createElement('div'); bar.className = 'prob-bar';
        bar.style.width = pct + '%';
        const barLabel = document.createElement('span'); barLabel.className = 'prob-label';
        barLabel.textContent = pct + '%';
        barWrap.appendChild(bar); barWrap.appendChild(barLabel);

        const sigEl = document.createElement('div'); sigEl.className = 'rank-signals';
        const allSigs = [...(s.signals || [])];
        if (s.chip['筹码信号'] && s.chip['筹码信号'] !== '无') allSigs.push(s.chip['筹码信号']);
        allSigs.forEach(sig => {
            const t = document.createElement('span'); t.className = 'sig-tag'; t.textContent = sig;
            sigEl.appendChild(t);
        });

        info.appendChild(row1); info.appendChild(barWrap); info.appendChild(sigEl);
        card.appendChild(num); card.appendChild(info);
        el.appendChild(card);
    });
}

function renderDetail(stocks) {
    const el = document.getElementById('detail-list');
    el.replaceChildren();
    stocks.forEach(s => {
        const card = document.createElement('div');
        card.className = 'detail-card';

        // 标题行
        const header = document.createElement('div'); header.className = 'detail-header';
        const title  = document.createElement('div'); title.className = 'detail-title';
        const emoji  = document.createElement('span'); emoji.textContent = s.emoji + ' ';
        const nameEl = document.createElement('span'); nameEl.textContent = s.name;
        const codeEl = document.createElement('span'); codeEl.className = 'detail-code'; codeEl.textContent = ' (' + s.code + ')';
        title.appendChild(emoji); title.appendChild(nameEl); title.appendChild(codeEl);

        const probEl = document.createElement('div'); probEl.className = 'detail-prob';
        probEl.style.color = probColor(s.probability);
        probEl.textContent = s.probability + '%';

        header.appendChild(title); header.appendChild(probEl);

        // 价格行
        const priceRow = document.createElement('div'); priceRow.className = 'detail-price-row';
        const priceEl = document.createElement('span'); priceEl.textContent = s.price.toFixed(2) + ' 元';
        const chgEl   = document.createElement('span');
        chgEl.className = s.change_pct >= 0 ? 'up' : 'down';
        chgEl.textContent = (s.change_pct >= 0 ? '+' : '') + s.change_pct.toFixed(2) + '%';
        priceRow.appendChild(priceEl); priceRow.appendChild(chgEl);

        // 评分条
        const scoresEl = document.createElement('div'); scoresEl.className = 'score-grid';
        const scoreNames = {'技术面':'🔧','基本面':'📊','资金面':'💰','情绪面':'🔥','筹码面':'📐'};
        Object.entries(scoreNames).forEach(([dim, icon]) => {
            const val = s.scores[dim] || 0;
            const item = document.createElement('div'); item.className = 'score-item';
            const lbl  = document.createElement('span'); lbl.className = 'score-dim'; lbl.textContent = icon + ' ' + dim;
            const stars= document.createElement('span'); stars.className = 'score-stars'; stars.textContent = scoreBar(val);
            const num  = document.createElement('span'); num.className = 'score-num'; num.textContent = val;
            item.appendChild(lbl); item.appendChild(stars); item.appendChild(num);
            scoresEl.appendChild(item);
        });

        // 筹码区块
        const chipEl = document.createElement('div'); chipEl.className = 'chip-block';
        const chipTitle = document.createElement('div'); chipTitle.className = 'chip-title'; chipTitle.textContent = '📐 筹码集中度';
        chipEl.appendChild(chipTitle);

        const chipInfo = {
            '70%筹码区间': s.chip['70%筹码区间'] || '—',
            '筹码宽度':     s.chip['筹码宽度']     || '—',
            '获利比例':     s.chip['获利比例']     || '—',
            '收敛趋势':     s.chip['15日收敛趋势'] || '—',
        };
        const chipGrid = document.createElement('div'); chipGrid.className = 'chip-grid';
        Object.entries(chipInfo).forEach(([k, v]) => {
            const item = document.createElement('div'); item.className = 'chip-item';
            const kEl  = document.createElement('span'); kEl.className = 'chip-key'; kEl.textContent = k;
            const vEl  = document.createElement('span'); vEl.className = 'chip-val'; vEl.textContent = v;
            item.appendChild(kEl); item.appendChild(vEl);
            chipGrid.appendChild(item);
        });
        chipEl.appendChild(chipGrid);

        if (s.chip['trend_bar']) {
            const bar = document.createElement('div'); bar.className = 'chip-trend-bar';
            bar.textContent = '趋势：' + s.chip['trend_bar'];
            chipEl.appendChild(bar);
        }
        if (s.chip['筹码信号'] && s.chip['筹码信号'] !== '无') {
            const sig = document.createElement('div'); sig.className = 'chip-signal-tag';
            sig.textContent = s.chip['筹码信号'];
            chipEl.appendChild(sig);
        }

        // 指标表
        const indEl = document.createElement('div'); indEl.className = 'ind-grid';
        const indKeys = ['主力资金','MACD','KDJ','布林带','换手率','量比'];
        indKeys.forEach(k => {
            if (!s.indicators[k]) return;
            const item = document.createElement('div'); item.className = 'ind-item';
            const kEl  = document.createElement('span'); kEl.className = 'ind-key'; kEl.textContent = k;
            const vEl  = document.createElement('span'); vEl.className = 'ind-val'; vEl.textContent = s.indicators[k].value;
            const sEl  = document.createElement('span'); sEl.className = 'ind-sig'; sEl.textContent = s.indicators[k].signal;
            item.appendChild(kEl); item.appendChild(vEl); item.appendChild(sEl);
            indEl.appendChild(item);
        });

        card.appendChild(header);
        card.appendChild(priceRow);
        card.appendChild(scoresEl);
        card.appendChild(chipEl);
        card.appendChild(indEl);
        el.appendChild(card);
    });
}

async function loadReport(date) {
    document.getElementById('loading').style.display = 'block';
    document.getElementById('stock-content').style.display = 'none';
    const res  = await fetch('/api/stock/report?date=' + encodeURIComponent(date));
    const data = await res.json();
    document.getElementById('loading').style.display = 'none';
    if (data.error) { document.getElementById('loading').textContent = data.error; document.getElementById('loading').style.display='block'; return; }
    renderRank(data.stocks);
    renderDetail(data.stocks);
    document.getElementById('stock-content').style.display = 'block';
}

dateSelect.addEventListener('change', () => loadReport(dateSelect.value));

// ── 后台异步刷新 ──────────────────────────────────────
const refreshBtn = document.getElementById('refresh-btn');
const progressBar = document.getElementById('refresh-progress');
const progressFill = document.getElementById('refresh-progress-fill');
const progressText = document.getElementById('refresh-progress-text');
const toast = document.getElementById('refresh-toast');
let pollTimer = null;
let pendingDates = [];
let pendingLatest = null;

refreshBtn.addEventListener('click', async () => {
    if (refreshBtn.classList.contains('refreshing')) return;
    refreshBtn.classList.add('refreshing');
    refreshBtn.textContent = '⟳';

    // 显示进度条
    progressBar.style.display = 'block';
    progressText.textContent = '启动分析引擎…';

    // 启动后台任务
    try {
        const res = await fetch('/api/stock/refresh', { method: 'POST' });
        const data = await res.json();
        if (data.error) {
            progressText.textContent = '启动失败：' + data.error;
            setTimeout(() => { progressBar.style.display = 'none'; }, 2000);
            refreshBtn.classList.remove('refreshing');
            refreshBtn.textContent = '↻';
            return;
        }
    } catch(e) {
        progressText.textContent = '请求失败：' + e.message;
        setTimeout(() => { progressBar.style.display = 'none'; }, 2000);
        refreshBtn.classList.remove('refreshing');
        refreshBtn.textContent = '↻';
        return;
    }

    // 轮询状态
    pollTimer = setInterval(checkRefreshStatus, 2000);
});

async function checkRefreshStatus() {
    try {
        const res = await fetch('/api/stock/refresh/status');
        const status = await res.json();

        if (status.running) {
            // 更新进度文本
            progressText.textContent = status.progress || '正在分析…';
            return;
        }

        if (!status.done) return; // 还没完成，继续轮询

        // 任务完成，停止轮询
        clearInterval(pollTimer);
        pollTimer = null;
        progressBar.style.display = 'none';
        refreshBtn.classList.remove('refreshing');
        refreshBtn.textContent = '↻';

        if (status.error) {
            alert('报告生成失败：' + status.error);
            return;
        }

        // 成功，显示 Toast
        pendingDates = status.dates || [];
        pendingLatest = status.latest || null;
        if (pendingLatest) {
            toast.style.display = 'block';
        }
    } catch(e) {
        clearInterval(pollTimer);
        pollTimer = null;
        progressBar.style.display = 'none';
        refreshBtn.classList.remove('refreshing');
        refreshBtn.textContent = '↻';
        alert('状态查询失败：' + e.message);
    }
}

// Toast 按钮事件
document.getElementById('toast-reload-btn').addEventListener('click', async () => {
    toast.style.display = 'none';
    // 更新日期下拉列表
    dateSelect.replaceChildren();
    pendingDates.forEach(d => {
        const opt = document.createElement('option');
        opt.value = d; opt.textContent = d;
        dateSelect.appendChild(opt);
    });
    if (pendingLatest) {
        dateSelect.value = pendingLatest;
        await loadReport(pendingLatest);
    }
    pendingDates = [];
    pendingLatest = null;
});

document.getElementById('toast-dismiss-btn').addEventListener('click', () => {
    toast.style.display = 'none';
    // 仍然更新日期列表（不加载报告）
    if (pendingDates.length) {
        dateSelect.replaceChildren();
        pendingDates.forEach(d => {
            const opt = document.createElement('option');
            opt.value = d; opt.textContent = d;
            dateSelect.appendChild(opt);
        });
    }
    pendingDates = [];
    pendingLatest = null;
});

if (dateSelect.value) loadReport(dateSelect.value);
</script>
</body>
</html>
