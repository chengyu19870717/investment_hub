<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>一图一表 - 程钰的百宝箱</title>
    <link rel="stylesheet" href="/static/css/style.css?v=2">
    <style>
    /* 流程图自动生成布局 */
    .flow-layout {
        display: flex;
        gap: 16px;
        height: calc(100vh - 160px);
        min-height: 400px;
    }
    .flow-steps-panel {
        width: 340px;
        flex-shrink: 0;
        display: flex;
        flex-direction: column;
        gap: 8px;
        overflow-y: auto;
    }
    .flow-svg-panel {
        flex: 1;
        background: var(--bg-card);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        overflow: auto;
        display: flex;
        flex-direction: column;
    }
    .flow-svg-toolbar {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 10px 14px;
        border-bottom: 1px solid var(--border);
    }
    .flow-svg-wrap {
        flex: 1;
        padding: 20px;
        display: flex;
        align-items: flex-start;
        justify-content: center;
    }
    .flow-svg-wrap svg {
        max-width: 100%;
    }

    /* 步骤列表 */
    .flow-title-input {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        font-size: 14px;
        font-family: inherit;
        background: var(--bg-card);
        color: var(--text-primary);
        outline: none;
    }
    .flow-title-input:focus { border-color: var(--accent); }

    .flow-step-item {
        display: flex;
        align-items: flex-start;
        gap: 8px;
        background: var(--bg-card);
        border-radius: var(--radius-sm);
        padding: 10px 12px;
        box-shadow: var(--shadow);
        border: 2px solid transparent;
        transition: border-color 0.15s;
        cursor: grab;
    }
    .flow-step-item:active { cursor: grabbing; }
    .flow-step-item.dragging { opacity: 0.4; border-color: var(--accent); }
    .flow-step-item.drag-over { border-color: var(--accent); background: var(--accent-light); }

    .flow-step-num {
        width: 24px;
        height: 24px;
        border-radius: 50%;
        background: var(--accent);
        color: #fff;
        font-size: 12px;
        font-weight: 700;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        margin-top: 2px;
    }
    .flow-step-body { flex: 1; min-width: 0; }
    .flow-step-name {
        font-size: 13px;
        font-weight: 600;
        color: var(--text-primary);
        margin-bottom: 2px;
    }
    .flow-step-desc {
        font-size: 12px;
        color: var(--text-muted);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }
    .flow-step-actions {
        display: flex;
        gap: 4px;
        flex-shrink: 0;
    }
    .flow-step-btn {
        border: none;
        background: none;
        color: var(--text-muted);
        cursor: pointer;
        padding: 2px 4px;
        border-radius: 4px;
        font-size: 14px;
    }
    .flow-step-btn:hover { color: var(--accent); background: var(--accent-light); }
    .flow-step-btn--danger:hover { color: #ff3b30; background: #fff0ef; }

    /* 步骤编辑表单 */
    .flow-step-form {
        background: var(--bg-card);
        border-radius: var(--radius-sm);
        padding: 12px;
        box-shadow: var(--shadow);
        border: 1px dashed var(--accent);
        display: flex;
        flex-direction: column;
        gap: 8px;
    }
    .flow-step-form input,
    .flow-step-form textarea {
        width: 100%;
        padding: 8px 10px;
        border: 1px solid var(--border);
        border-radius: 6px;
        font-size: 13px;
        font-family: inherit;
        background: var(--bg-page);
        color: var(--text-primary);
        outline: none;
    }
    .flow-step-form input:focus,
    .flow-step-form textarea:focus { border-color: var(--accent); }
    .flow-step-form textarea { resize: vertical; min-height: 40px; }
    .flow-step-form-btns { display: flex; gap: 8px; }
    </style>
</head>
<body>
<div class="page page--wide" style="max-width:100%;padding:0;">
    <header class="header">
        <div class="header-inner">
            <div style="display:flex;align-items:center;justify-content:space-between;">
                <div style="display:flex;align-items:center;gap:12px;">
                    <a href="/" class="back-btn">←</a>
                    <div class="logo">
                        <span class="logo-icon">🗂️</span>
                        <span class="logo-text">一图一表</span>
                    </div>
                </div>
                <div style="display:flex;gap:8px;">
                    <button id="btn-new"    class="btn-secondary">＋ 新建</button>
                    <button id="btn-delete" class="btn-secondary" style="color:#ff3b30;display:none;">删除</button>
                    <button id="btn-save"    class="btn-primary">保存</button>
                </div>
            </div>
        </div>
    </header>

    <div class="main" style="padding:12px 16px;flex:1;display:flex;flex-direction:column;">
        <!-- 图表列表 -->
        <div id="chart-list-bar" style="margin-bottom:8px;">
            <div style="font-size:12px;font-weight:600;color:var(--text-muted);margin-bottom:6px;">已保存流程图</div>
            <div id="chart-list" style="display:flex;gap:6px;flex-wrap:wrap;"></div>
            <div id="chart-empty" style="font-size:13px;color:var(--text-muted);">暂无图表，点击新建</div>
        </div>

        <div class="flow-layout">
            <!-- 左侧：步骤维护 -->
            <div class="flow-steps-panel">
                <input type="text" class="flow-title-input" id="flow-title" placeholder="流程图名称…">
                <div id="steps-container"></div>
                <button class="btn-secondary" id="btn-add-step" style="width:100%;">＋ 添加步骤</button>
            </div>

            <!-- 右侧：自动生成流程图 -->
            <div class="flow-svg-panel">
                <div class="flow-svg-toolbar">
                    <span style="font-size:13px;font-weight:600;color:var(--text-muted);">自动生成流程图</span>
                </div>
                <div class="flow-svg-wrap">
                    <svg id="flow-svg" viewBox="0 0 800 600" width="800" height="600"></svg>
                </div>
            </div>
        </div>
    </div>
    <footer class="footer"><span>程钰的百宝箱 · 本地版</span></footer>
</div>

<script>
// ── 状态 ──────────────────────────────────────────────────
let charts    = [];
let currentId = null;
let steps     = []; // [{id, name, desc}]
let nextStepId = 1;

// ── DOM ───────────────────────────────────────────────────
const $ = s => document.querySelector(s);
const titleInput = $('#flow-title');
const stepsCont  = $('#steps-container');
const chartList  = $('#chart-list');
const chartEmpty = $('#chart-empty');
const btnNew     = $('#btn-new');
const btnDel     = $('#btn-delete');
const btnSave    = $('#btn-save');
const btnAddStep = $('#btn-add-step');
const svgEl      = $('#flow-svg');

// ── 初始化 ────────────────────────────────────────────────
async function init() {
    const res = await fetch('/api/charts');
    charts = await res.json();
    renderChartList();
    if (charts.length > 0) loadChart(charts[0].id);
}

function renderChartList() {
    chartList.replaceChildren();
    chartEmpty.style.display = charts.length === 0 ? 'block' : 'none';
    charts.forEach(c => {
        const tag = document.createElement('span');
        tag.className = 'chart-list-item' + (c.id === currentId ? ' chart-list-item--active' : '');
        tag.textContent = c.title || '未命名';
        tag.style.cursor = 'pointer';
        tag.addEventListener('click', () => loadChart(c.id));
        chartList.appendChild(tag);
    });
}

async function loadChart(id) {
    const res  = await fetch('/api/charts/' + id);
    const data = await res.json();
    currentId = id;
    titleInput.value = data.title;
    const parsed = JSON.parse(data.data_json || '{"steps":[]}');
    steps = parsed.steps || [];
    nextStepId = steps.reduce((m, s) => Math.max(m, s.id + 1), 1);
    btnDel.style.display = 'inline-block';
    renderSteps();
    renderChartList();
}

// ── 步骤维护 ──────────────────────────────────────────────
function renderSteps() {
    stepsCont.replaceChildren();
    steps.forEach((s, i) => {
        const item = document.createElement('div');
        item.className = 'flow-step-item';
        item.draggable = true;
        item.dataset.stepId = s.id;
        item.innerHTML = `
            <div class="flow-step-num">${i + 1}</div>
            <div class="flow-step-body">
                <div class="flow-step-name">${esc(s.name)}</div>
                ${s.desc ? '<div class="flow-step-desc">' + esc(s.desc) + '</div>' : ''}
            </div>
            <div class="flow-step-actions">
                <button class="flow-step-btn btn-edit-step" title="编辑">✏️</button>
                <button class="flow-step-btn flow-step-btn--danger btn-del-step" title="删除">🗑️</button>
            </div>
        `;
        // 拖拽排序
        item.addEventListener('dragstart', e => {
            e.dataTransfer.setData('text/plain', s.id);
            item.classList.add('dragging');
        });
        item.addEventListener('dragend', () => item.classList.remove('dragging'));
        item.addEventListener('dragover', e => { e.preventDefault(); item.classList.add('drag-over'); });
        item.addEventListener('dragleave', () => item.classList.remove('drag-over'));
        item.addEventListener('drop', e => {
            e.preventDefault();
            item.classList.remove('drag-over');
            const fromId = parseInt(e.dataTransfer.getData('text/plain'));
            const toId = s.id;
            if (fromId !== toId) {
                const fromIdx = steps.findIndex(x => x.id === fromId);
                const toIdx = steps.findIndex(x => x.id === toId);
                const [moved] = steps.splice(fromIdx, 1);
                steps.splice(toIdx, 0, moved);
                renderSteps();
                renderFlowchart();
            }
        });

        // 编辑
        item.querySelector('.btn-edit-step').addEventListener('click', () => editStep(s));
        // 删除
        item.querySelector('.btn-del-step').addEventListener('click', () => {
            steps = steps.filter(x => x.id !== s.id);
            renderSteps();
            renderFlowchart();
        });

        stepsCont.appendChild(item);
    });
    renderFlowchart();
}

function editStep(step) {
    const existing = stepsCont.querySelector('.flow-step-form');
    if (existing) existing.remove();

    const form = document.createElement('div');
    form.className = 'flow-step-form';
    form.innerHTML = `
        <input type="text" class="step-name-input" placeholder="步骤名称" value="${esc(step.name)}">
        <textarea class="step-desc-input" placeholder="步骤描述（可选）">${esc(step.desc || '')}</textarea>
        <div class="flow-step-form-btns">
            <button class="btn-primary btn-save-step">保存</button>
            <button class="btn-secondary btn-cancel-step">取消</button>
        </div>
    `;
    stepsCont.appendChild(form);
    form.querySelector('.step-name-input').focus();

    form.querySelector('.btn-save-step').addEventListener('click', () => {
        const name = form.querySelector('.step-name-input').value.trim();
        const desc = form.querySelector('.step-desc-input').value.trim();
        if (!name) { alert('请填写步骤名称'); return; }
        step.name = name;
        step.desc = desc;
        form.remove();
        renderSteps();
    });
    form.querySelector('.btn-cancel-step').addEventListener('click', () => form.remove());
}

function addStepForm() {
    const existing = stepsCont.querySelector('.flow-step-form');
    if (existing) existing.remove();

    const form = document.createElement('div');
    form.className = 'flow-step-form';
    form.innerHTML = `
        <input type="text" class="step-name-input" placeholder="步骤名称">
        <textarea class="step-desc-input" placeholder="步骤描述（可选）"></textarea>
        <div class="flow-step-form-btns">
            <button class="btn-primary btn-save-step">添加</button>
            <button class="btn-secondary btn-cancel-step">取消</button>
        </div>
    `;
    stepsCont.appendChild(form);
    form.querySelector('.step-name-input').focus();

    const newStep = { id: nextStepId++, name: '', desc: '' };

    form.querySelector('.btn-save-step').addEventListener('click', () => {
        const name = form.querySelector('.step-name-input').value.trim();
        const desc = form.querySelector('.step-desc-input').value.trim();
        if (!name) { alert('请填写步骤名称'); return; }
        newStep.name = name;
        newStep.desc = desc;
        steps.push(newStep);
        form.remove();
        renderSteps();
    });
    form.querySelector('.btn-cancel-step').addEventListener('click', () => form.remove());
}

btnAddStep.addEventListener('click', addStepForm);

// ── 自动生成流程图 ────────────────────────────────────────
function renderFlowchart() {
    const W = 800, H = 600;
    const nodeW = 180, nodeH = 56, gapY = 70;
    const startX = W / 2 - nodeW / 2;
    const startY = 30;

    svgEl.setAttribute('viewBox', `0 0 ${W} ${Math.max(H, startY + steps.length * (nodeH + gapY))}`);
    svgEl.innerHTML = '';

    // 定义箭头
    const defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
    defs.innerHTML = `<marker id="arrow2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#8e8e93"/>
    </marker>`;
    svgEl.appendChild(defs);

    if (steps.length === 0) {
        const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        text.setAttribute('x', W / 2);
        text.setAttribute('y', H / 2);
        text.setAttribute('text-anchor', 'middle');
        text.setAttribute('font-size', '16');
        text.setAttribute('fill', '#8e8e93');
        text.textContent = '添加步骤后自动生成流程图';
        svgEl.appendChild(text);
        return;
    }

    steps.forEach((s, i) => {
        const y = startY + i * (nodeH + gapY);

        // 连接线
        if (i > 0) {
            const prevY = startY + (i - 1) * (nodeH + gapY) + nodeH;
            const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
            line.setAttribute('x1', W / 2);
            line.setAttribute('y1', prevY);
            line.setAttribute('x2', W / 2);
            line.setAttribute('y2', y);
            line.setAttribute('stroke', '#8e8e93');
            line.setAttribute('stroke-width', '2');
            line.setAttribute('marker-end', 'url(#arrow2)');
            svgEl.appendChild(line);
        }

        // 节点
        const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
        g.setAttribute('transform', `translate(${startX}, ${y})`);

        const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
        rect.setAttribute('width', nodeW);
        rect.setAttribute('height', nodeH);
        rect.setAttribute('rx', '10');
        rect.setAttribute('fill', '#f0f4ff');
        rect.setAttribute('stroke', '#007aff');
        rect.setAttribute('stroke-width', '1.5');
        g.appendChild(rect);

        // 步骤序号
        const badge = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        badge.setAttribute('cx', '16');
        badge.setAttribute('cy', '16');
        badge.setAttribute('r', '10');
        badge.setAttribute('fill', '#007aff');
        g.appendChild(badge);

        const badgeText = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        badgeText.setAttribute('x', '16');
        badgeText.setAttribute('y', '16');
        badgeText.setAttribute('dominant-baseline', 'central');
        badgeText.setAttribute('text-anchor', 'middle');
        badgeText.setAttribute('font-size', '11');
        badgeText.setAttribute('fill', '#fff');
        badgeText.setAttribute('font-weight', '700');
        badgeText.textContent = i + 1;
        g.appendChild(badgeText);

        // 步骤名称
        const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        text.setAttribute('x', '36');
        text.setAttribute('y', '20');
        text.setAttribute('font-size', '13');
        text.setAttribute('fill', '#1d1d1f');
        text.setAttribute('font-weight', '600');
        text.setAttribute('font-family', '-apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif');
        text.textContent = s.name;
        g.appendChild(text);

        // 描述
        if (s.desc) {
            const descText = document.createElementNS('http://www.w3.org/2000/svg', 'text');
            descText.setAttribute('x', '36');
            descText.setAttribute('y', '40');
            descText.setAttribute('font-size', '11');
            descText.setAttribute('fill', '#8e8e93');
            descText.setAttribute('font-family', '-apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif');
            descText.textContent = s.desc.length > 20 ? s.desc.slice(0, 20) + '…' : s.desc;
            g.appendChild(descText);
        }

        svgEl.appendChild(g);
    });
}

// ── 新建 / 保存 / 删除 ─────────────────────────────────────
btnNew.addEventListener('click', () => {
    currentId = null;
    steps = [];
    nextStepId = 1;
    titleInput.value = '';
    btnDel.style.display = 'none';
    renderSteps();
    renderChartList();
    titleInput.focus();
});

btnSave.addEventListener('click', async () => {
    const title = titleInput.value.trim() || '未命名流程图';
    const dataJson = JSON.stringify({ steps });
    const body = JSON.stringify({ title, data_json: dataJson });
    const headers = { 'Content-Type': 'application/json' };

    if (currentId) {
        await fetch('/api/charts/' + currentId, { method: 'PUT', headers, body });
    } else {
        const res = await fetch('/api/charts', { method: 'POST', headers, body });
        const data = await res.json();
        currentId = data.id;
        btnDel.style.display = 'inline-block';
    }
    const listRes = await fetch('/api/charts');
    charts = await listRes.json();
    renderChartList();
    alert('✅ 已保存');
});

btnDel.addEventListener('click', async () => {
    if (!currentId) return;
    if (!confirm('确定删除这张流程图？')) return;
    await fetch('/api/charts/' + currentId, { method: 'DELETE' });
    currentId = null;
    steps = [];
    btnDel.style.display = 'none';
    titleInput.value = '';
    renderSteps();
    const listRes = await fetch('/api/charts');
    charts = await listRes.json();
    renderChartList();
    if (charts.length > 0) loadChart(charts[0].id);
});

// ── 工具 ──────────────────────────────────────────────────
function esc(s) {
    if (!s) return '';
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
}

init();
</script>
</body>
</html>
