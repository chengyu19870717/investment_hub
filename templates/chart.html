<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>一图一表 - 程钰的百宝箱</title>
    <link rel="stylesheet" href="/static/css/style.css?v=2">
    <style>
    /* 产品列表视图 */
    .prod-layout { display: flex; flex-direction: column; gap: 12px; }
    .prod-header { display: flex; align-items: center; justify-content: space-between; }
    .prod-search {
        padding: 8px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm);
        font-size: 13px; background: var(--bg-page); color: var(--text-primary); outline: none; width: 240px;
    }
    .prod-search:focus { border-color: var(--accent); }
    .prod-table-wrap { overflow-x: auto; }
    .prod-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .prod-table th, .prod-table td {
        padding: 10px 14px; text-align: left; border-bottom: 1px solid var(--border); white-space: nowrap;
    }
    .prod-table th { background: var(--bg-page); font-weight: 600; color: var(--text-muted); font-size: 12px; }
    .prod-table tbody tr:hover { background: var(--bg-card-hover); }
    .prod-empty { text-align: center; color: var(--text-muted); padding: 48px 0; }
    .prod-actions { display: flex; gap: 4px; }
    .prod-btn {
        padding: 4px 10px; border: 1px solid var(--border); border-radius: 6px;
        background: var(--bg-card); color: var(--text-secondary); font-size: 12px;
        cursor: pointer; transition: background 0.15s, color 0.15s;
    }
    .prod-btn:hover { background: var(--bg-card-hover); }
    .prod-btn--primary { color: var(--accent); border-color: var(--accent); }
    .prod-btn--danger { color: #ff3b30; }
    .prod-btn--danger:hover { background: #fff0ef; }

    /* 产品编辑 Modal */
    .prod-form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .prod-form-group { display: flex; flex-direction: column; gap: 4px; }
    .prod-form-group label { font-size: 12px; font-weight: 600; color: var(--text-muted); }
    .prod-form-group input, .prod-form-group textarea {
        padding: 8px 10px; border: 1px solid var(--border); border-radius: 6px;
        font-size: 13px; font-family: inherit; background: var(--bg-page);
        color: var(--text-primary); outline: none;
    }
    .prod-form-group input:focus, .prod-form-group textarea:focus { border-color: var(--accent); }
    .prod-form-group textarea { resize: vertical; }
    .prod-form-group.full { grid-column: 1 / -1; }

    /* 流程图视图 */
    .flow-layout {
        display: flex; gap: 16px; height: calc(100vh - 180px); min-height: 400px;
    }
    .flow-steps-panel {
        width: 340px; flex-shrink: 0; display: flex; flex-direction: column; gap: 8px; overflow-y: auto;
    }
    .flow-svg-panel {
        flex: 1; background: var(--bg-card); border-radius: var(--radius);
        box-shadow: var(--shadow); overflow: auto; display: flex; flex-direction: column;
    }
    .flow-svg-toolbar {
        display: flex; align-items: center; gap: 8px; padding: 10px 14px;
        border-bottom: 1px solid var(--border);
    }
    .flow-svg-wrap {
        flex: 1; padding: 20px; display: flex; align-items: flex-start; justify-content: center;
    }
    .flow-svg-wrap svg { max-width: 100%; }
    .flow-title-input {
        width: 100%; padding: 10px 12px; border: 1px solid var(--border);
        border-radius: var(--radius-sm); font-size: 14px; font-family: inherit;
        background: var(--bg-card); color: var(--text-primary); outline: none;
    }
    .flow-title-input:focus { border-color: var(--accent); }
    .flow-step-item {
        display: flex; align-items: flex-start; gap: 8px; background: var(--bg-card);
        border-radius: var(--radius-sm); padding: 10px 12px; box-shadow: var(--shadow);
        border: 2px solid transparent; transition: border-color 0.15s; cursor: grab;
    }
    .flow-step-item:active { cursor: grabbing; }
    .flow-step-item.dragging { opacity: 0.4; border-color: var(--accent); }
    .flow-step-item.drag-over { border-color: var(--accent); background: var(--accent-light); }
    .flow-step-item[data-level="2"] { margin-left: 24px; }
    .flow-step-item[data-level="3"] { margin-left: 48px; }
    .flow-step-level-badge {
        padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: 600;
        flex-shrink: 0; margin-top: 2px;
    }
    .flow-step-level-badge[data-level="1"] { background: #007aff; color: #fff; }
    .flow-step-level-badge[data-level="2"] { background: #ff9500; color: #fff; }
    .flow-step-level-badge[data-level="3"] { background: #34c759; color: #fff; }
    .flow-step-num {
        width: 24px; height: 24px; border-radius: 50%; background: var(--accent);
        color: #fff; font-size: 12px; font-weight: 700; display: flex;
        align-items: center; justify-content: center; flex-shrink: 0; margin-top: 2px;
    }
    .flow-step-body { flex: 1; min-width: 0; }
    .flow-step-name { font-size: 13px; font-weight: 600; color: var(--text-primary); margin-bottom: 2px; }
    .flow-step-desc { font-size: 12px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .flow-step-actions { display: flex; gap: 4px; flex-shrink: 0; }
    .flow-step-btn {
        border: none; background: none; color: var(--text-muted); cursor: pointer;
        padding: 2px 4px; border-radius: 4px; font-size: 14px;
    }
    .flow-step-btn:hover { color: var(--accent); background: var(--accent-light); }
    .flow-step-btn--danger:hover { color: #ff3b30; background: #fff0ef; }
    .flow-step-form {
        background: var(--bg-card); border-radius: var(--radius-sm); padding: 12px;
        box-shadow: var(--shadow); border: 1px dashed var(--accent);
        display: flex; flex-direction: column; gap: 8px;
    }
    .flow-step-form input, .flow-step-form textarea {
        width: 100%; padding: 8px 10px; border: 1px solid var(--border);
        border-radius: 6px; font-size: 13px; font-family: inherit;
        background: var(--bg-page); color: var(--text-primary); outline: none;
    }
    .flow-step-form input:focus, .flow-step-form textarea:focus { border-color: var(--accent); }
    .flow-step-form textarea { resize: vertical; min-height: 40px; }
    .flow-step-form-btns { display: flex; gap: 8px; }

    /* 通用 Modal（复用自数据标准） */
    .ds-modal { display: none; position: fixed; inset: 0; z-index: 1000; }
    .ds-modal--open { display: flex !important; align-items: center; justify-content: center; }
    .ds-modal-backdrop { position: absolute; inset: 0; background: rgba(0,0,0,0.4); }
    .ds-modal-content {
        position: relative; background: var(--bg-card); border-radius: 14px;
        box-shadow: 0 8px 32px rgba(0,0,0,0.2); max-height: 90vh;
        display: flex; flex-direction: column; z-index: 1; width: 600px;
    }
    .ds-modal-header {
        display: flex; align-items: center; justify-content: space-between;
        padding: 16px 20px; border-bottom: 1px solid var(--border);
    }
    .ds-modal-header h3 { font-size: 16px; font-weight: 600; }
    .ds-modal-close {
        border: none; background: none; font-size: 22px; color: var(--text-muted);
        cursor: pointer; padding: 0 4px; line-height: 1;
    }
    .ds-modal-body { padding: 20px; overflow-y: auto; flex: 1; }
    .ds-modal-footer {
        display: flex; align-items: center; gap: 8px;
        padding: 12px 20px; border-top: 1px solid var(--border);
    }
    </style>
</head>
<body>
<div class="page page--wide" style="max-width:100%;padding:0;">
    <header class="header">
        <div class="header-inner">
            <div style="display:flex;align-items:center;justify-content:space-between;">
                <div style="display:flex;align-items:center;gap:12px;">
                    <a href="/" class="back-btn">←</a>
                    <div class="logo">
                        <span class="logo-icon">🗂️</span>
                        <span class="logo-text" id="page-title">一图一表</span>
                    </div>
                </div>
                <div style="display:flex;gap:8px;" id="header-actions">
                    <!-- 动态按钮 -->
                </div>
            </div>
        </div>
    </header>

    <div class="main" style="padding:12px 16px;flex:1;display:flex;flex-direction:column;">
        <!-- 视图 1: 产品列表 -->
        <div id="view-product-list" class="prod-layout">
            <div class="prod-header">
                <input type="text" class="prod-search" id="prodSearch" placeholder="搜索产品…">
                <button class="btn-primary" id="btn-add-product">＋ 新增产品</button>
            </div>
            <div class="prod-table-wrap">
                <table class="prod-table" id="prodTable">
                    <thead>
                        <tr>
                            <th>产品ID</th><th>产品名称</th><th>产品描述</th>
                            <th>产品经理</th><th>业务对接人</th><th>主管业务部门</th><th>操作</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
            <div id="prod-empty" class="prod-empty">暂无产品，点击"新增产品"添加</div>
        </div>

        <!-- 视图 2: 流程图编辑 -->
        <div id="view-flow-editor" style="display:none;">
            <div style="margin-bottom:8px;">
                <button class="btn-secondary" id="btn-back-to-list">← 返回产品列表</button>
                <span id="flow-product-name" style="margin-left:12px;font-weight:600;font-size:14px;"></span>
            </div>
            <div class="flow-layout">
                <div class="flow-steps-panel">
                    <input type="text" class="flow-title-input" id="flow-title" placeholder="流程图名称…">
                    <div id="steps-container"></div>
                    <button class="btn-secondary" id="btn-add-step" style="width:100%;">＋ 添加步骤</button>
                </div>
                <div class="flow-svg-panel">
                    <div class="flow-svg-toolbar">
                        <span style="font-size:13px;font-weight:600;color:var(--text-muted);">自动生成流程图</span>
                        <button class="btn-primary" id="btn-save-flow" style="margin-left:auto;">保存</button>
                    </div>
                    <div class="flow-svg-wrap">
                        <svg id="flow-svg" viewBox="0 0 800 600" width="800" height="600"></svg>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <footer class="footer"><span>程钰的百宝箱 · 本地版</span></footer>
</div>

<!-- Modal: 产品编辑 -->
<div class="ds-modal" id="prodModal">
    <div class="ds-modal-backdrop"></div>
    <div class="ds-modal-content ds-modal--lg">
        <div class="ds-modal-header">
            <h3 id="prodModalTitle">新增产品</h3>
            <button class="ds-modal-close" data-close="prodModal">×</button>
        </div>
        <div class="ds-modal-body">
            <input type="hidden" id="prodEditId">
            <div class="prod-form-grid">
                <div class="prod-form-group">
                    <label>产品ID *</label>
                    <input type="text" id="prodId" placeholder="如：PROD_001">
                </div>
                <div class="prod-form-group">
                    <label>产品名称 *</label>
                    <input type="text" id="prodName" placeholder="如：信贷审批系统">
                </div>
                <div class="prod-form-group full">
                    <label>产品描述</label>
                    <textarea id="prodDesc" rows="2" placeholder="产品功能描述"></textarea>
                </div>
                <div class="prod-form-group">
                    <label>产品经理</label>
                    <input type="text" id="prodManager" placeholder="如：张三">
                </div>
                <div class="prod-form-group">
                    <label>业务对接人</label>
                    <input type="text" id="prodBizContact" placeholder="如：李四">
                </div>
                <div class="prod-form-group full">
                    <label>主管业务部门</label>
                    <input type="text" id="prodBizDept" placeholder="如：信贷管理部">
                </div>
            </div>
        </div>
        <div class="ds-modal-footer">
            <button class="btn-secondary" data-close="prodModal">取消</button>
            <button class="btn-primary" id="btnSaveProd">保存</button>
        </div>
    </div>
</div>

<script>
// ── 状态 ──────────────────────────────────────────────────
const $ = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);

let products = [];
let currentProductId = null; // 当前编辑的产品 ID
let steps = [];
let nextStepId = 1;

// ── 视图切换 ──────────────────────────────────────────────
function showView(view) {
    $('#view-product-list').style.display = view === 'list' ? '' : 'none';
    $('#view-flow-editor').style.display = view === 'flow' ? '' : 'none';
    if (view === 'list') {
        $('#page-title').textContent = '一图一表';
        $('#header-actions').innerHTML = '';
    }
}

// ── Modal 工具 ────────────────────────────────────────────
function openModal(id) { const el = document.getElementById(id); if (el) el.classList.add('ds-modal--open'); }
function closeModal(id) { const el = document.getElementById(id); if (el) el.classList.remove('ds-modal--open'); }
$$('.ds-modal-backdrop').forEach(bp => bp.addEventListener('click', () => bp.parentElement.classList.remove('ds-modal--open')));
$$('[data-close]').forEach(btn => btn.addEventListener('click', () => closeModal(btn.dataset.close)));

// ── 产品列表 ──────────────────────────────────────────────
async function loadProducts() {
    const res = await fetch('/api/products');
    products = await res.json();
    renderProductTable();
}

function renderProductTable() {
    const q = ($('#prodSearch')?.value || '').toLowerCase();
    const list = products.filter(p =>
        (p.product_id || '').toLowerCase().includes(q) ||
        (p.product_name || '').toLowerCase().includes(q) ||
        (p.biz_dept || '').includes(q)
    );
    const tbody = $('#prodTable tbody');
    const emptyEl = $('#prod-empty');
    if (!list.length) {
        tbody.innerHTML = '';
        emptyEl.style.display = 'block';
        $('#prodTable').style.display = 'none';
        return;
    }
    emptyEl.style.display = 'none';
    $('#prodTable').style.display = '';
    tbody.innerHTML = list.map(p => `
        <tr>
            <td>${esc(p.product_id)}</td>
            <td><strong>${esc(p.product_name)}</strong></td>
            <td>${esc(p.product_desc || '—')}</td>
            <td>${esc(p.product_manager || '—')}</td>
            <td>${esc(p.biz_contact || '—')}</td>
            <td>${esc(p.biz_dept || '—')}</td>
            <td class="prod-actions">
                <button class="prod-btn prod-btn--primary" onclick="openFlowEditor(${p.id}, '${esc(p.product_name)}')">一图一表</button>
                <button class="prod-btn" onclick="openProductModal(${p.id})">编辑</button>
                <button class="prod-btn prod-btn--danger" onclick="deleteProduct(${p.id})">删除</button>
            </td>
        </tr>
    `).join('');
}

$('#prodSearch')?.addEventListener('input', renderProductTable);

// ── 产品编辑 ──────────────────────────────────────────────
function openProductModal(id) {
    $('#prodEditId').value = '';
    $('#prodId').value = '';
    $('#prodName').value = '';
    $('#prodDesc').value = '';
    $('#prodManager').value = '';
    $('#prodBizContact').value = '';
    $('#prodBizDept').value = '';
    $('#prodModalTitle').textContent = '新增产品';

    if (id) {
        const p = products.find(x => x.id === id);
        if (!p) return;
        $('#prodEditId').value = p.id;
        $('#prodId').value = p.product_id;
        $('#prodId').disabled = true;
        $('#prodName').value = p.product_name;
        $('#prodDesc').value = p.product_desc || '';
        $('#prodManager').value = p.product_manager || '';
        $('#prodBizContact').value = p.biz_contact || '';
        $('#prodBizDept').value = p.biz_dept || '';
        $('#prodModalTitle').textContent = '编辑产品';
    } else {
        $('#prodId').disabled = false;
    }
    openModal('prodModal');
}

$('#btnSaveProd').addEventListener('click', async () => {
    const editId = $('#prodEditId').value;
    const productId = ($('#prodId').value || '').trim();
    const productName = ($('#prodName').value || '').trim();
    if (!productId || !productName) { alert('请填写产品ID和名称'); return; }

    const data = {
        product_id: productId,
        product_name: productName,
        product_desc: ($('#prodDesc').value || '').trim(),
        product_manager: ($('#prodManager').value || '').trim(),
        biz_contact: ($('#prodBizContact').value || '').trim(),
        biz_dept: ($('#prodBizDept').value || '').trim(),
    };

    try {
        if (editId) {
            await fetch('/api/products/' + editId, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data),
            });
        } else {
            const res = await fetch('/api/products', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data),
            });
            if (!res.ok) {
                const err = await res.json();
                alert('保存失败：' + (err.error || '未知错误'));
                return;
            }
        }
        closeModal('prodModal');
        await loadProducts();
    } catch (e) {
        alert('请求失败：' + e.message);
    }
});

window.deleteProduct = async function (id) {
    if (!confirm('确认删除该产品？')) return;
    try {
        await fetch('/api/products/' + id, { method: 'DELETE' });
        await loadProducts();
    } catch (e) { alert('删除失败：' + e.message); }
};

// ── 流程图编辑器 ──────────────────────────────────────────
window.openFlowEditor = async function (id, name) {
    currentProductId = id;
    showView('flow');
    $('#flow-product-name').textContent = name;
    $('#page-title').textContent = '一图一表 — ' + name;
    $('#header-actions').innerHTML = '';

    // 加载该产品的图表数据
    try {
        const res = await fetch('/api/products/' + id + '/chart');
        const data = await res.json();
        $('#flow-title').value = data.product_name || '';
        if (data.chart_data) {
            const parsed = JSON.parse(data.chart_data);
            steps = parsed.steps || [];
            nextStepId = steps.reduce((m, s) => Math.max(m, s.id + 1), 1);
        } else {
            steps = [];
            nextStepId = 1;
        }
    } catch {
        steps = [];
        nextStepId = 1;
    }
    renderSteps();
};

$('#btn-back-to-list').addEventListener('click', () => {
    currentProductId = null;
    steps = [];
    showView('list');
    loadProducts();
});

// ── 步骤维护 ──────────────────────────────────────────────
function renderSteps() {
    const container = $('#steps-container');
    container.replaceChildren();
    steps.forEach((s, i) => {
        const level = s.level || 1;
        const item = document.createElement('div');
        item.className = 'flow-step-item';
        item.draggable = true;
        item.dataset.stepId = s.id;
        item.dataset.level = level;
        item.innerHTML = `
            <span class="flow-step-level-badge" data-level="${level}">L${level}</span>
            <div class="flow-step-body">
                <div class="flow-step-name">${esc(s.name)}</div>
                ${s.desc ? '<div class="flow-step-desc">' + esc(s.desc) + '</div>' : ''}
            </div>
            <div class="flow-step-actions">
                <button class="flow-step-btn btn-add-substep" title="添加子步骤">➕</button>
                <button class="flow-step-btn btn-edit-step" title="编辑">✏️</button>
                <button class="flow-step-btn flow-step-btn--danger btn-del-step" title="删除">🗑️</button>
            </div>
        `;
        // 拖拽排序
        item.addEventListener('dragstart', e => { e.dataTransfer.setData('text/plain', s.id); item.classList.add('dragging'); });
        item.addEventListener('dragend', () => item.classList.remove('dragging'));
        item.addEventListener('dragover', e => { e.preventDefault(); item.classList.add('drag-over'); });
        item.addEventListener('dragleave', () => item.classList.remove('drag-over'));
        item.addEventListener('drop', e => {
            e.preventDefault();
            item.classList.remove('drag-over');
            const fromId = parseInt(e.dataTransfer.getData('text/plain'));
            const toId = s.id;
            if (fromId !== toId) {
                const fromIdx = steps.findIndex(x => x.id === fromId);
                const toIdx = steps.findIndex(x => x.id === toId);
                const [moved] = steps.splice(fromIdx, 1);
                steps.splice(toIdx, 0, moved);
                renderSteps();
            }
        });
        item.querySelector('.btn-add-substep').addEventListener('click', () => addSubStep(s));
        item.querySelector('.btn-edit-step').addEventListener('click', () => editStep(s));
        item.querySelector('.btn-del-step').addEventListener('click', () => {
            steps = steps.filter(x => x.id !== s.id);
            renderSteps();
        });
        container.appendChild(item);
    });
    renderFlowchart();
}

function addSubStep(parentStep) {
    const container = $('#steps-container');
    const existing = container.querySelector('.flow-step-form');
    if (existing) existing.remove();

    const parentLevel = parentStep.level || 1;
    const childLevel = Math.min(parentLevel + 1, 3);

    const form = document.createElement('div');
    form.className = 'flow-step-form';
    form.style.marginLeft = (childLevel - 1) * 24 + 'px';
    form.innerHTML = `
        <div style="font-size:12px;color:var(--text-muted);margin-bottom:4px;">作为「${esc(parentStep.name)}」的子步骤（L${childLevel}）</div>
        <input type="text" class="step-name-input" placeholder="步骤名称">
        <textarea class="step-desc-input" placeholder="步骤描述（可选）"></textarea>
        <div class="flow-step-form-btns">
            <button class="btn-primary btn-save-step">添加</button>
            <button class="btn-secondary btn-cancel-step">取消</button>
        </div>
    `;

    // 在父步骤后面插入表单
    const parentItem = container.querySelector(`[data-step-id="${parentStep.id}"]`);
    if (parentItem) {
        container.insertBefore(form, parentItem.nextSibling);
    } else {
        container.appendChild(form);
    }
    form.querySelector('.step-name-input').focus();

    const parentIdx = steps.findIndex(x => x.id === parentStep.id);
    form.querySelector('.btn-save-step').addEventListener('click', () => {
        const name = form.querySelector('.step-name-input').value.trim();
        const desc = form.querySelector('.step-desc-input').value.trim();
        if (!name) { alert('请填写步骤名称'); return; }
        const newStep = { id: nextStepId++, name, desc, level: childLevel, parent_id: parentStep.id };
        steps.splice(parentIdx + 1, 0, newStep);
        form.remove();
        renderSteps();
    });
    form.querySelector('.btn-cancel-step').addEventListener('click', () => form.remove());
}

function editStep(step) {
    const container = $('#steps-container');
    const existing = container.querySelector('.flow-step-form');
    if (existing) existing.remove();

    const level = step.level || 1;
    const form = document.createElement('div');
    form.className = 'flow-step-form';
    form.style.marginLeft = (level - 1) * 24 + 'px';
    form.innerHTML = `
        <input type="text" class="step-name-input" placeholder="步骤名称" value="${esc(step.name)}">
        <textarea class="step-desc-input" placeholder="步骤描述（可选）">${esc(step.desc || '')}</textarea>
        <div>
            <label style="font-size:12px;color:var(--text-muted);margin-right:8px;">步骤层级：</label>
            <select class="step-level-select">
                <option value="1" ${level===1?'selected':''}>一级步骤</option>
                <option value="2" ${level===2?'selected':''}>二级步骤</option>
                <option value="3" ${level===3?'selected':''}>三级步骤</option>
            </select>
        </div>
        <div class="flow-step-form-btns">
            <button class="btn-primary btn-save-step">保存</button>
            <button class="btn-secondary btn-cancel-step">取消</button>
        </div>
    `;
    container.appendChild(form);
    form.querySelector('.step-name-input').focus();
    form.querySelector('.btn-save-step').addEventListener('click', () => {
        const name = form.querySelector('.step-name-input').value.trim();
        const desc = form.querySelector('.step-desc-input').value.trim();
        const level = parseInt(form.querySelector('.step-level-select').value);
        if (!name) { alert('请填写步骤名称'); return; }
        step.name = name; step.desc = desc; step.level = level;
        form.remove();
        renderSteps();
    });
    form.querySelector('.btn-cancel-step').addEventListener('click', () => form.remove());
}

$('#btn-add-step').addEventListener('click', () => {
    const container = $('#steps-container');
    const existing = container.querySelector('.flow-step-form');
    if (existing) existing.remove();

    const form = document.createElement('div');
    form.className = 'flow-step-form';
    form.innerHTML = `
        <input type="text" class="step-name-input" placeholder="步骤名称">
        <textarea class="step-desc-input" placeholder="步骤描述（可选）"></textarea>
        <div>
            <label style="font-size:12px;color:var(--text-muted);margin-right:8px;">步骤层级：</label>
            <select class="step-level-select">
                <option value="1">一级步骤</option>
                <option value="2">二级步骤</option>
                <option value="3">三级步骤</option>
            </select>
        </div>
        <div class="flow-step-form-btns">
            <button class="btn-primary btn-save-step">添加</button>
            <button class="btn-secondary btn-cancel-step">取消</button>
        </div>
    `;
    container.appendChild(form);
    form.querySelector('.step-name-input').focus();

    const newStep = { id: nextStepId++, name: '', desc: '', level: 1 };
    form.querySelector('.btn-save-step').addEventListener('click', () => {
        const name = form.querySelector('.step-name-input').value.trim();
        const desc = form.querySelector('.step-desc-input').value.trim();
        const level = parseInt(form.querySelector('.step-level-select').value);
        if (!name) { alert('请填写步骤名称'); return; }
        newStep.name = name; newStep.desc = desc; newStep.level = level;
        steps.push(newStep);
        form.remove();
        renderSteps();
    });
    form.querySelector('.btn-cancel-step').addEventListener('click', () => form.remove());
});

// ── 自动生成流程图（支持多层级）─────────────────────────────
function renderFlowchart() {
    const W = 800, nodeW = 200, nodeH = 60, gapY = 72;
    const startY = 30;
    const levelOffsets = { 1: W/2 - nodeW/2, 2: W/2 - nodeW/2 + 60, 3: W/2 - nodeW/2 + 120 };
    const levelColors = { 1: '#007aff', 2: '#ff9500', 3: '#34c759' };
    const H = Math.max(600, startY + steps.length * (nodeH + gapY) + 40);

    const svgEl = $('#flow-svg');
    svgEl.setAttribute('viewBox', `0 0 ${W} ${H}`);
    svgEl.innerHTML = '';

    const defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
    defs.innerHTML = `<marker id="arrow2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#8e8e93"/>
    </marker>`;
    svgEl.appendChild(defs);

    if (steps.length === 0) {
        const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        text.setAttribute('x', W / 2);
        text.setAttribute('y', H / 2);
        text.setAttribute('text-anchor', 'middle');
        text.setAttribute('font-size', '16');
        text.setAttribute('fill', '#8e8e93');
        text.textContent = '添加步骤后自动生成流程图';
        svgEl.appendChild(text);
        return;
    }

    steps.forEach((s, i) => {
        const level = s.level || 1;
        const x = levelOffsets[level] || levelOffsets[1];
        const y = startY + i * (nodeH + gapY);
        const color = levelColors[level] || levelColors[1];

        // 连线
        if (i > 0) {
            const prevLevel = steps[i-1].level || 1;
            const prevX = levelOffsets[prevLevel] || levelOffsets[1];
            const prevY = startY + (i - 1) * (nodeH + gapY) + nodeH;

            const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
            line.setAttribute('x1', prevX + nodeW/2);
            line.setAttribute('y1', prevY);
            line.setAttribute('x2', x + nodeW/2);
            line.setAttribute('y2', y);
            line.setAttribute('stroke', '#8e8e93');
            line.setAttribute('stroke-width', level !== prevLevel ? '1.5' : '2');
            if (level !== prevLevel) line.setAttribute('stroke-dasharray', '4,3');
            line.setAttribute('marker-end', 'url(#arrow2)');
            svgEl.appendChild(line);
        }

        // 节点
        const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
        g.setAttribute('transform', `translate(${x}, ${y})`);

        const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
        rect.setAttribute('width', nodeW); rect.setAttribute('height', nodeH);
        rect.setAttribute('rx', '10'); rect.setAttribute('fill', level === 1 ? '#f0f4ff' : level === 2 ? '#fff7ed' : '#f0fdf4');
        rect.setAttribute('stroke', color); rect.setAttribute('stroke-width', level === 1 ? '1.5' : '1');
        g.appendChild(rect);

        // 层级标签
        const lvlLabel = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        lvlLabel.setAttribute('x', nodeW - 8); lvlLabel.setAttribute('y', 12);
        lvlLabel.setAttribute('text-anchor', 'end'); lvlLabel.setAttribute('font-size', '9');
        lvlLabel.setAttribute('fill', color); lvlLabel.setAttribute('font-weight', '600');
        lvlLabel.textContent = `L${level}`;
        g.appendChild(lvlLabel);

        // 序号
        const badge = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        badge.setAttribute('cx', '16'); badge.setAttribute('cy', '16');
        badge.setAttribute('r', '10'); badge.setAttribute('fill', color);
        g.appendChild(badge);

        const badgeText = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        badgeText.setAttribute('x', '16'); badgeText.setAttribute('y', '16');
        badgeText.setAttribute('dominant-baseline', 'central'); badgeText.setAttribute('text-anchor', 'middle');
        badgeText.setAttribute('font-size', '11'); badgeText.setAttribute('fill', '#fff');
        badgeText.setAttribute('font-weight', '700');
        badgeText.textContent = i + 1;
        g.appendChild(badgeText);

        // 名称
        const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        text.setAttribute('x', '36'); text.setAttribute('y', '22');
        text.setAttribute('font-size', level === 1 ? '13' : '12');
        text.setAttribute('fill', '#1d1d1f');
        text.setAttribute('font-weight', level === 1 ? '600' : '400');
        text.setAttribute('font-family', '-apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif');
        text.textContent = s.name;
        g.appendChild(text);

        // 描述
        if (s.desc) {
            const descText = document.createElementNS('http://www.w3.org/2000/svg', 'text');
            descText.setAttribute('x', '36'); descText.setAttribute('y', '42');
            descText.setAttribute('font-size', '11'); descText.setAttribute('fill', '#8e8e93');
            descText.setAttribute('font-family', '-apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif');
            descText.textContent = s.desc.length > 22 ? s.desc.slice(0, 22) + '…' : s.desc;
            g.appendChild(descText);
        }

        svgEl.appendChild(g);
    });
}

// ── 保存流程图 ────────────────────────────────────────────
$('#btn-save-flow').addEventListener('click', async () => {
    if (!currentProductId) return;
    const title = ($('#flow-title').value || '').trim();
    const chartData = JSON.stringify({ steps });
    try {
        await fetch('/api/products/' + currentProductId + '/chart', {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ chart_data: chartData, title: title || null }),
        });
        alert('✅ 已保存');
    } catch (e) { alert('保存失败：' + e.message); }
});

// ── 工具 ──────────────────────────────────────────────────
function esc(s) {
    if (!s) return '';
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
}

$('#btn-add-product').addEventListener('click', () => openProductModal());
showView('list');
loadProducts();
</script>
