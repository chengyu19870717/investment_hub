<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>一图一表 - 程钰的百宝箱</title>
    <link rel="stylesheet" href="/static/css/style.css?v=2">
</head>
<body>
<div class="page page--wide" style="max-width:100%;padding:0;">
    <header class="header">
        <div class="header-inner">
            <div style="display:flex;align-items:center;justify-content:space-between;">
                <div style="display:flex;align-items:center;gap:12px;">
                    <a href="/" class="back-btn">←</a>
                    <div class="logo">
                        <span class="logo-icon">🗂️</span>
                        <span class="logo-text">一图一表</span>
                    </div>
                </div>
                <div style="display:flex;gap:8px;">
                    <button id="btn-new"    class="btn-secondary">＋ 新建</button>
                    <button id="btn-delete" class="btn-secondary" style="color:#ff3b30;display:none;">删除</button>
                </div>
            </div>
        </div>
    </header>

    <div class="main" style="padding:12px 16px;flex:1;display:flex;flex-direction:column;">
        <div class="chart-layout">
            <!-- 左侧列表 -->
            <div class="chart-sidebar">
                <div class="chart-sidebar-title">已保存流程图</div>
                <div id="chart-list"></div>
                <div id="chart-empty" style="font-size:13px;color:var(--text-muted);padding:8px 0;">暂无图表，点击新建</div>
            </div>

            <!-- 右侧画布 -->
            <div class="chart-canvas-wrap">
                <!-- 工具栏 -->
                <div class="chart-toolbar">
                    <input type="text" id="chart-title" placeholder="流程图名称…" maxlength="40">
                    <button id="btn-add-node"  class="btn-secondary">＋ 节点</button>
                    <button id="btn-link-mode" class="btn-secondary" id="btn-link">连线</button>
                    <button id="btn-save"      class="btn-primary">保存</button>
                </div>

                <!-- SVG 画布 -->
                <svg id="diagram-svg" class="chart-svg">
                    <defs>
                        <marker id="arrow" markerWidth="10" markerHeight="7"
                                refX="9" refY="3.5" orient="auto">
                            <polygon points="0 0, 10 3.5, 0 7" fill="#8e8e93"/>
                        </marker>
                    </defs>
                    <g id="edges-layer"></g>
                    <g id="nodes-layer"></g>
                </svg>

                <!-- 悬浮输入框（编辑节点文字用） -->
                <input type="text" id="node-label-input" maxlength="30"
                       style="display:none;position:absolute;border:2px solid var(--accent);
                              border-radius:6px;padding:4px 8px;font-size:13px;font-family:inherit;
                              background:#fff;outline:none;text-align:center;z-index:10;">

                <div class="chart-hint" id="chart-hint">双击节点编辑文字 · 拖动节点移动 · 连线模式：依次点两个节点</div>
            </div>
        </div>
    </div>
    <footer class="footer"><span>程钰的百宝箱 · 本地版</span></footer>
</div>

<script>
// ── 状态 ──────────────────────────────────────────────────
const NODE_W = 120, NODE_H = 44, NODE_R = 8;
let charts      = [];   // [{id, title, updated_at}]
let currentId   = null; // 当前编辑的图表 id（null = 新建未保存）
let nodes       = [];   // [{id, x, y, label}]
let edges       = [];   // [{id, from, to}]
let nextNodeId  = 1;
let nextEdgeId  = 1;
let linkMode    = false;
let linkSource  = null; // 连线第一个节点 id
let dragging    = null; // {nodeId, ox, oy}
let svgRect     = null;

// ── DOM 引用 ──────────────────────────────────────────────
const svg        = document.getElementById('diagram-svg');
const edgesLayer = document.getElementById('edges-layer');
const nodesLayer = document.getElementById('nodes-layer');
const labelInput = document.getElementById('node-label-input');
const chartList  = document.getElementById('chart-list');
const chartEmpty = document.getElementById('chart-empty');
const titleInput = document.getElementById('chart-title');
const btnNew     = document.getElementById('btn-new');
const btnDel     = document.getElementById('btn-delete');
const btnAdd     = document.getElementById('btn-add-node');
const btnLink    = document.getElementById('btn-link-mode');
const btnSave    = document.getElementById('btn-save');
const hint       = document.getElementById('chart-hint');

// ── 初始化 ────────────────────────────────────────────────
async function init() {
    const res  = await fetch('/api/charts');
    charts = await res.json();
    renderChartList();
    if (charts.length > 0) loadChart(charts[0].id);
}

function renderChartList() {
    chartList.replaceChildren();
    chartEmpty.style.display = charts.length === 0 ? 'block' : 'none';
    charts.forEach(c => {
        const item = document.createElement('div');
        item.className = 'chart-list-item' + (c.id === currentId ? ' chart-list-item--active' : '');
        item.textContent = c.title || '未命名';
        item.dataset.id = c.id;
        item.addEventListener('click', () => loadChart(c.id));
        chartList.appendChild(item);
    });
}

async function loadChart(id) {
    const res  = await fetch('/api/charts/' + id);
    const data = await res.json();
    currentId = id;
    titleInput.value = data.title;
    const parsed = JSON.parse(data.data_json || '{"nodes":[],"edges":[]}');
    nodes = parsed.nodes || [];
    edges = parsed.edges || [];
    nextNodeId = nodes.reduce((m, n) => Math.max(m, n.id + 1), 1);
    nextEdgeId = edges.reduce((m, e) => Math.max(m, e.id + 1), 1);
    btnDel.style.display = 'inline-block';
    renderAll();
    renderChartList();
}

// ── 渲染 ──────────────────────────────────────────────────
function renderAll() {
    renderEdges();
    renderNodes();
}

function renderEdges() {
    edgesLayer.replaceChildren();
    edges.forEach(e => {
        const src = nodes.find(n => n.id === e.from);
        const dst = nodes.find(n => n.id === e.to);
        if (!src || !dst) return;
        const {x1,y1,x2,y2} = edgeEndpoints(src, dst);
        const line = document.createElementNS('http://www.w3.org/2000/svg','line');
        line.setAttribute('x1', x1); line.setAttribute('y1', y1);
        line.setAttribute('x2', x2); line.setAttribute('y2', y2);
        line.setAttribute('stroke', '#8e8e93');
        line.setAttribute('stroke-width', '1.5');
        line.setAttribute('marker-end', 'url(#arrow)');
        line.dataset.edgeId = e.id;
        line.addEventListener('click', ev => { ev.stopPropagation(); deleteEdge(e.id); });
        line.style.cursor = 'pointer';
        edgesLayer.appendChild(line);
    });
}

function edgeEndpoints(src, dst) {
    const sx = src.x + NODE_W / 2, sy = src.y + NODE_H / 2;
    const dx = dst.x + NODE_W / 2, dy = dst.y + NODE_H / 2;
    const angle = Math.atan2(dy - sy, dx - sx);
    // 求矩形边缘交点
    const hw = NODE_W / 2, hh = NODE_H / 2;
    const tanA = Math.tan(angle);
    let x1, y1, x2, y2;
    // 出发点
    if (Math.abs(Math.cos(angle)) * hh > Math.abs(Math.sin(angle)) * hw) {
        const sign = Math.cos(angle) > 0 ? 1 : -1;
        x1 = sx + sign * hw; y1 = sy + sign * hw * tanA;
    } else {
        const sign = Math.sin(angle) > 0 ? 1 : -1;
        x1 = sx + sign * hh / tanA; y1 = sy + sign * hh;
    }
    // 到达点
    const angle2 = angle + Math.PI;
    const tanA2  = Math.tan(angle2);
    if (Math.abs(Math.cos(angle2)) * hh > Math.abs(Math.sin(angle2)) * hw) {
        const sign = Math.cos(angle2) > 0 ? 1 : -1;
        x2 = dx + sign * hw; y2 = dy + sign * hw * tanA2;
    } else {
        const sign = Math.sin(angle2) > 0 ? 1 : -1;
        x2 = dx + sign * hh / tanA2; y2 = dy + sign * hh;
    }
    return {x1, y1, x2, y2};
}

function renderNodes() {
    nodesLayer.replaceChildren();
    nodes.forEach(n => {
        const g = document.createElementNS('http://www.w3.org/2000/svg','g');
        g.setAttribute('transform', `translate(${n.x},${n.y})`);
        g.dataset.nodeId = n.id;
        g.style.cursor = 'grab';

        const rect = document.createElementNS('http://www.w3.org/2000/svg','rect');
        rect.setAttribute('width',  NODE_W);
        rect.setAttribute('height', NODE_H);
        rect.setAttribute('rx', NODE_R);
        rect.setAttribute('fill',   '#f0f4ff');
        rect.setAttribute('stroke', '#007aff');
        rect.setAttribute('stroke-width', '1.5');

        const text = document.createElementNS('http://www.w3.org/2000/svg','text');
        text.setAttribute('x', NODE_W / 2);
        text.setAttribute('y', NODE_H / 2);
        text.setAttribute('dominant-baseline', 'central');
        text.setAttribute('text-anchor', 'middle');
        text.setAttribute('font-size', '13');
        text.setAttribute('fill', '#1d1d1f');
        text.setAttribute('font-family', '-apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif');
        text.textContent = n.label;

        g.appendChild(rect);
        g.appendChild(text);

        // 事件
        g.addEventListener('mousedown', ev => onNodeMouseDown(ev, n.id));
        g.addEventListener('dblclick',  ev => { ev.stopPropagation(); startEditLabel(n.id, g); });
        g.addEventListener('click',     ev => { ev.stopPropagation(); onNodeClick(n.id, g, rect); });

        nodesLayer.appendChild(g);
    });
}

// ── 拖拽 ──────────────────────────────────────────────────
function getSVGPoint(ev) {
    svgRect = svg.getBoundingClientRect();
    return { x: ev.clientX - svgRect.left, y: ev.clientY - svgRect.top };
}

function onNodeMouseDown(ev, id) {
    if (linkMode) return;
    ev.stopPropagation();
    const pt  = getSVGPoint(ev);
    const node = nodes.find(n => n.id === id);
    dragging = { nodeId: id, ox: pt.x - node.x, oy: pt.y - node.y };
    document.addEventListener('mousemove', onMouseMove);
    document.addEventListener('mouseup',   onMouseUp);
}

function onMouseMove(ev) {
    if (!dragging) return;
    const pt   = getSVGPoint(ev);
    const node = nodes.find(n => n.id === dragging.nodeId);
    node.x = Math.max(0, pt.x - dragging.ox);
    node.y = Math.max(0, pt.y - dragging.oy);
    // 更新节点 g 位置
    const g = nodesLayer.querySelector(`[data-node-id="${dragging.nodeId}"]`);
    if (g) g.setAttribute('transform', `translate(${node.x},${node.y})`);
    renderEdges(); // 同步更新连线
}

function onMouseUp() {
    dragging = null;
    document.removeEventListener('mousemove', onMouseMove);
    document.removeEventListener('mouseup',   onMouseUp);
}

// ── 连线模式 ──────────────────────────────────────────────
function onNodeClick(id, g, rect) {
    if (!linkMode) return;
    if (!linkSource) {
        linkSource = id;
        rect.setAttribute('stroke', '#ff9500');
        hint.textContent = '已选第一个节点，点击第二个节点完成连线';
    } else {
        if (linkSource !== id) {
            // 避免重复边
            const dup = edges.find(e => e.from === linkSource && e.to === id);
            if (!dup) {
                edges.push({ id: nextEdgeId++, from: linkSource, to: id });
                renderEdges();
            }
        }
        // 重置第一个节点样式
        const srcG = nodesLayer.querySelector(`[data-node-id="${linkSource}"]`);
        if (srcG) srcG.querySelector('rect').setAttribute('stroke', '#007aff');
        linkSource = null;
        hint.textContent = '点击选择第二个节点，或再次点击退出连线模式';
    }
}

btnLink.addEventListener('click', () => {
    linkMode = !linkMode;
    linkSource = null;
    btnLink.style.background = linkMode ? 'var(--accent-light)' : '';
    btnLink.style.color      = linkMode ? 'var(--accent)' : '';
    hint.textContent = linkMode
        ? '连线模式：依次点击两个节点建立箭头连接'
        : '双击节点编辑文字 · 拖动节点移动 · 连线模式：依次点两个节点';
    // 恢复所有节点颜色
    nodesLayer.querySelectorAll('rect').forEach(r => r.setAttribute('stroke','#007aff'));
});

// ── 编辑标签 ──────────────────────────────────────────────
let editingNodeId = null;

function startEditLabel(id, g) {
    const node    = nodes.find(n => n.id === id);
    svgRect       = svg.getBoundingClientRect();
    editingNodeId = id;

    const scaleX = svgRect.width  / svg.viewBox.baseVal.width  || 1;
    const scaleY = svgRect.height / svg.viewBox.baseVal.height || 1;

    // 取 g 的实际位置
    const gRect = g.getBoundingClientRect();
    const wrap  = svg.parentElement;
    const wrapRect = wrap.getBoundingClientRect();

    labelInput.style.display = 'block';
    labelInput.style.left    = (gRect.left - wrapRect.left) + 'px';
    labelInput.style.top     = (gRect.top  - wrapRect.top)  + 'px';
    labelInput.style.width   = gRect.width  + 'px';
    labelInput.style.height  = gRect.height + 'px';
    labelInput.value         = node.label;
    labelInput.focus();
    labelInput.select();
}

labelInput.addEventListener('blur',    commitLabel);
labelInput.addEventListener('keydown', ev => { if (ev.key === 'Enter') { commitLabel(); } });

function commitLabel() {
    if (editingNodeId === null) return;
    const node = nodes.find(n => n.id === editingNodeId);
    if (node) node.label = labelInput.value.trim() || node.label;
    labelInput.style.display = 'none';
    editingNodeId = null;
    renderNodes();
}

// ── 添加节点 ──────────────────────────────────────────────
btnAdd.addEventListener('click', () => {
    svgRect = svg.getBoundingClientRect();
    const cx = (svgRect.width  / 2 - NODE_W / 2) + (Math.random() - 0.5) * 80;
    const cy = (svgRect.height / 2 - NODE_H / 2) + (Math.random() - 0.5) * 60;
    nodes.push({ id: nextNodeId++, x: Math.max(0, cx), y: Math.max(0, cy), label: '步骤' });
    renderNodes();
});

// ── 删除边 ────────────────────────────────────────────────
function deleteEdge(id) {
    edges = edges.filter(e => e.id !== id);
    renderEdges();
}

// ── SVG 点击空白区：取消连线选择 ─────────────────────────
svg.addEventListener('click', () => {
    if (linkSource) {
        const srcG = nodesLayer.querySelector(`[data-node-id="${linkSource}"]`);
        if (srcG) srcG.querySelector('rect').setAttribute('stroke', '#007aff');
        linkSource = null;
    }
});

// ── SVG 右键删除节点 ──────────────────────────────────────
nodesLayer.addEventListener('contextmenu', ev => {
    ev.preventDefault();
    const g = ev.target.closest('[data-node-id]');
    if (!g) return;
    const id = parseInt(g.dataset.nodeId);
    nodes = nodes.filter(n => n.id !== id);
    edges = edges.filter(e => e.from !== id && e.to !== id);
    renderAll();
});

// ── 保存 ──────────────────────────────────────────────────
btnSave.addEventListener('click', saveChart);

async function saveChart() {
    const title    = titleInput.value.trim() || '未命名流程图';
    const dataJson = JSON.stringify({ nodes, edges });
    const body     = JSON.stringify({ title, data_json: dataJson });
    const headers  = { 'Content-Type': 'application/json' };

    let res;
    if (currentId) {
        res = await fetch('/api/charts/' + currentId, { method: 'PUT', headers, body });
    } else {
        res = await fetch('/api/charts', { method: 'POST', headers, body });
        const data = await res.json();
        currentId = data.id;
        btnDel.style.display = 'inline-block';
    }
    // 刷新列表
    const listRes = await fetch('/api/charts');
    charts = await listRes.json();
    renderChartList();
    hint.textContent = '✅ 已保存';
    setTimeout(() => { hint.textContent = '双击节点编辑文字 · 拖动节点移动 · 连线模式：依次点两个节点'; }, 2000);
}

// ── 新建 ──────────────────────────────────────────────────
btnNew.addEventListener('click', () => {
    currentId   = null;
    nodes       = [];
    edges       = [];
    nextNodeId  = 1;
    nextEdgeId  = 1;
    titleInput.value = '';
    btnDel.style.display = 'none';
    renderAll();
    renderChartList();
    titleInput.focus();
});

// ── 删除 ──────────────────────────────────────────────────
btnDel.addEventListener('click', async () => {
    if (!currentId) return;
    if (!confirm('确定删除这张流程图？')) return;
    await fetch('/api/charts/' + currentId, { method: 'DELETE' });
    currentId = null;
    nodes = []; edges = [];
    btnDel.style.display = 'none';
    titleInput.value = '';
    renderAll();
    const listRes = await fetch('/api/charts');
    charts = await listRes.json();
    renderChartList();
    if (charts.length > 0) loadChart(charts[0].id);
});

init();
</script>
</body>
</html>
